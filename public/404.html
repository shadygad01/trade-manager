<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio OS — Trade &amp; Portfolio Management</title>
    <!--
      GitHub Pages serves this file for any path that isn't a real file on
      disk — which, for a client-routed single-page app, is every deep link
      (e.g. /trade-manager/import) on a hard refresh or direct navigation,
      since only /trade-manager/index.html physically exists. Without this
      redirect, a refresh on any page but the root looks like the whole app
      "disappeared" (a real 404, not data loss — IndexedDB is untouched).

      This re-encodes the requested path into a query string on the root
      URL and redirects there; index.html's matching inline script decodes
      it and restores the real path via history.replaceState before wouter
      takes over, so the user lands back on the exact page they refreshed.
      Standard technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(segmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
