name: Update Price Snapshot

on:
  schedule:
    # EGX trades ~10:00-14:30 Cairo time (UTC+2 winter / UTC+3 summer), Sun-Thu.
    # Runs every 30 minutes across 07:00-13:30 UTC: the whole session in both
    # DST regimes PLUS at least two post-close runs (close is 11:30 UTC in
    # summer, 12:30 UTC in winter), so the day's final snapshot always captures
    # the official closing price rather than a mid-session tick.
    - cron: "*/30 7-13 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run fetch-prices

      - name: Commit and push snapshot if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/price-snapshot.json public/price-history.json
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update price snapshot"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN never triggers other workflows, so the
      # snapshot commit above would sit on main without ever reaching the
      # deployed site — the app fetches price-snapshot.json from the deployed
      # static files, so prices only go live with a deploy. workflow_dispatch
      # is exempt from that recursion guard, so trigger the deploy explicitly.
      - name: Deploy the site so the new snapshot goes live
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
